services:
  freellmapi:
    image: ghcr.io/odhomane/freellmapi:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-8787}:${PORT:-8787}"
    environment:
      PORT: "${PORT:-8787}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-}"
      NODE_ENV: production
    volumes:
      - ../server/data:/app/server/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch(`http://127.0.0.1:${process.env.PORT || 8787}/api/ping`).then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
